[pytest]
# Pytest configuration for CrewAI tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Enable coverage reporting
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    # Coverage configuration
    --cov-config=.coveragerc
    # Markers configuration
    --strict-markers
    # Warnings
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# Minimum coverage
# Minimum version of pytest
minversion = 7.0

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external resources)
    e2e: End-to-end tests (slowest, full workflow)
    slow: Slow running tests
    agent: Tests related to Agent classes
    tool: Tests related to Tool classes
    crew: Tests related to Crew classes
    schema: Tests related to Pydantic schemas
    model: Tests related to database models
    smoke: Quick smoke tests to verify basic functionality

# Asyncio mode
asyncio_mode = auto

# Log options
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
timeout = 300

# Console output style
console_output_style = progress

# Ignore directories
norecursedirs = .git .tox dist build *.egg venv env
